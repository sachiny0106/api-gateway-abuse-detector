server:
  port: 8080

spring:
  application:
    name: gateway-service

  cloud:
    gateway:
      enabled: true
      metrics:
        enabled: true

  data:
    redis:
      host: localhost
      port: 6379
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 50
          max-idle: 10
          min-idle: 5

  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      acks: all
      retries: 3

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  metrics:
    export:
      prometheus:
        enabled: true
    tags:
      application: gateway-service

logging:
  level:
    com.abuseguard: DEBUG
    org.springframework.cloud.gateway: DEBUG